# CRAFT Default Configuration
# Contains system-wide defaults for SFT, RL, Curriculum, Evaluation, and Hardware

probe:
  n_samples: 5
  n_questions: 200
  temperature: 0.8
  sampling_fractions:
    gsm8k: 0.4        # 80 questions
    strategyqa: 0.3   # 60 questions
    mmlu: 0.3         # 60 questions

sft:
  epochs: 3
  learning_rate: 2e-4
  max_seq_length: 1024
  lora_rank: 64
  lora_alpha: 128
  lora_dropout: 0.05
  logging_steps: 10
  save_steps: 50
  warmup_ratio: 0.03
  weight_decay: 0.01

rl:
  total_steps: 500
  group_size: 8
  n_traces: 6
  temperature: 0.8
  kl_beta: 0.04
  kl_target: 0.1
  dpo_beta: 0.1
  dpo_step_activation: 100    # Component B starts at step 100
  learning_rate: 5e-6
  save_steps: 50
  logging_steps: 5

curriculum:
  initial_range: [0.4, 0.7]   # Learning zone
  window_size: 50             # Rolling accuracy tracker window size
  stability_threshold: 0.7    # Accuracy stability target to expand curriculum
  update_frequency: 100       # Step frequency to re-measure difficulty map

deploy:
  quant_type: "Q4_K_M"

hardware_profiles:
  kaggle:
    gpu_count: 2
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    use_gradient_checkpointing: true
  local_2x24gb:
    gpu_count: 2
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    use_gradient_checkpointing: true
